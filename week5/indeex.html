<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Login to FashionHub</h2>

    <p id="errorMsg"></p>

<script src="script.js"></script>
</body>
</html>
